services:
  mysql:
    image: mysql:8.0
    container_name: usermanagement-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usermanagement
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: usermanagement-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/usermanagement?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: mySuperSecretKeyThatIsAtLeast256BitsLongForJwtSigning123
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: